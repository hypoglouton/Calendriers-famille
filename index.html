<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendrier partagé</title>
<style>
:root{
  --bg:#071226;--panel:#0d1a31cc;--panel-solid:#0d1a31;--panel-2:#10203c;--text:#eef4ff;--muted:#a6b4d0;
  --line:#24426d;--accent:#40d8d0;--accent-2:#34d16f;--shadow:0 20px 50px rgba(0,0,0,.28);
  --chip:#19345d;--chip-text:#f5fbff;--danger:#ff6677;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 20% 20%,rgba(52,216,208,.14),transparent 26%),radial-gradient(circle at 80% 20%,rgba(52,209,111,.13),transparent 24%),linear-gradient(180deg,#071226 0%,#03102d 100%);color:var(--text);min-height:100%}
body{padding:22px}
body::before,body::after{content:"";position:fixed;inset:auto;pointer-events:none;z-index:0;border-radius:999px;filter:blur(10px);opacity:.5}
body::before{width:340px;height:340px;left:-70px;top:60px;background:radial-gradient(circle,#2bbcff55,transparent 68%)}
body::after{width:360px;height:360px;right:-80px;top:20px;background:radial-gradient(circle,#29f2aa33,transparent 70%)}
.app{position:relative;z-index:1;max-width:1600px;margin:0 auto}
.card{background:linear-gradient(180deg,rgba(12,25,52,.93),rgba(9,19,38,.90));border:1px solid rgba(120,160,220,.16);border-radius:26px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
.header{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;padding:28px}
.kicker{display:inline-flex;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#dbe6ff}
h1{margin:18px 0 10px;font-size:64px;line-height:.95}
.subtitle{margin:0;color:var(--muted);font-size:18px}
.header-actions{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
select,input,textarea,button{font:inherit}
button, .btnlike, select, input, textarea{border-radius:18px;border:1px solid rgba(255,255,255,.11)}
button{cursor:pointer;color:var(--text);background:var(--panel-solid);padding:16px 20px}
button:hover{transform:translateY(-1px)}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none}
.ghost{background:rgba(11,22,43,.75);color:#eef4ff}
label.select-wrap, .search-wrap{display:flex;align-items:center;gap:12px;background:rgba(8,18,37,.72);padding:10px 14px}
label.select-wrap span, .search-wrap span{color:#d1def8}
select, .search-wrap input{background:transparent;color:var(--text);border:none;outline:none;min-width:180px}
select option{color:#0b1730;background:#ffffff}
.toolbar,.tabs{margin-top:16px;padding:16px 18px}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tab{padding:12px 18px;border-radius:14px;background:rgba(11,22,43,.72);border:1px solid rgba(255,255,255,.09);color:#d9e6ff}
.tab.active{background:linear-gradient(135deg,rgba(64,216,208,.22),rgba(52,209,111,.22));border-color:rgba(85,255,212,.35);color:#fff}
.toolbar{display:flex;justify-content:space-between;gap:18px;align-items:center}
.month-nav{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.month-label{font-size:28px;color:#f6fbff;min-width:250px;text-align:center}
.main{margin-top:18px}
.calendar-shell,.agenda-shell{padding:18px}
.view-title{margin-bottom:14px}
.view-title h2{margin:0 0 6px;font-size:28px}
.view-title p{margin:0;color:var(--muted)}
.weekdays,.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.weekday{padding:12px 10px;text-align:center;background:rgba(255,255,255,.06);border-radius:14px;color:#d9e5fb;font-weight:600}
.day{position:relative;min-height:150px;padding:12px;border-radius:18px;background:rgba(9,18,35,.82);border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:10px}
.day.outside{opacity:.38}
.day.today{outline:2px solid rgba(93,255,212,.45);box-shadow:0 0 0 1px rgba(93,255,212,.15) inset}
.day-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.day-number{font-size:22px;font-weight:700}
.add-mini{width:34px;height:34px;padding:0;border-radius:12px;background:rgba(255,255,255,.08)}
.stack{display:flex;flex-direction:column;gap:7px}
.empty{color:#8395ba;font-size:13px;padding-top:4px}
.event{display:flex;flex-direction:column;gap:3px;align-items:flex-start;width:100%;padding:9px 10px;border:none;border-radius:12px;background:var(--chip);color:var(--chip-text);text-align:left}
.event[draggable="true"]{cursor:grab}
.event.dragging{opacity:.45;transform:scale(.98);cursor:grabbing}
.day.drop-target{outline:3px dashed rgba(255,255,255,.72);outline-offset:-4px;transform:translateY(-2px)}
.drag-ghost{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;padding:10px 12px;border-radius:12px;background:rgba(7,16,34,.96);border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 40px rgba(0,0,0,.35);color:#fff;max-width:220px}
.drag-ghost time{display:block;font-size:12px;opacity:.8}
.drag-ghost span{display:block;font-size:14px;font-weight:700}
body.drag-active{user-select:none;cursor:grabbing}
.day-menu{position:absolute;left:10px;right:10px;top:42px;z-index:6;padding:12px;border-radius:16px;background:rgba(6,15,31,.96);border:1px solid rgba(255,255,255,.12);box-shadow:0 16px 40px rgba(0,0,0,.35)}
.day-menu .mini-title{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
.day-menu .mini-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.day-menu .mini-row.one{grid-template-columns:1fr}
.day-menu select,.day-menu button{width:100%;min-width:0}
.day-menu select{padding:10px 12px;background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12);border-radius:12px}
.day-menu .mini-actions{display:flex;gap:8px}
.day-menu .mini-actions button{padding:10px 12px;border-radius:12px}
[data-theme="paper"] .day-menu{background:#f8f0e2;border-color:rgba(90,65,35,.18)}
[data-theme="paper"] .day-menu select{background:#fffaf2;color:#31241a;border-color:rgba(90,65,35,.18)}
.event time{font-size:12px;opacity:.9}
.event small{font-size:12px;opacity:.82}
.more{font-size:12px;color:#bdd2ff;background:rgba(255,255,255,.06);padding:7px 9px;border-radius:10px}
.legend,.kpis{display:flex;gap:10px;flex-wrap:wrap}
.legend{margin-top:14px}
.pill,.legend .item{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.07);font-size:13px}
.dot{width:10px;height:10px;border-radius:999px;display:inline-block}
.kpis{justify-content:flex-end}
.kpi{min-width:160px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.06);display:flex;flex-direction:column;gap:6px}
.kpi span{font-size:12px;color:#c7d5ef;text-transform:uppercase;letter-spacing:.08em}
.kpi strong{font-size:18px}
.agenda-list{display:flex;flex-direction:column;gap:14px}
.agenda-day{padding:14px;border-radius:18px;background:rgba(255,255,255,.04)}
.agenda-headline{display:flex;justify-content:space-between;gap:12px;margin-bottom:10px;color:#eff6ff}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
th{color:#c9d6f0;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
.modal{position:fixed;inset:0;background:rgba(1,7,18,.60);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal.open{display:flex}
.modal-card{width:min(680px,100%);padding:22px;background:linear-gradient(180deg,#10203a,#0a1730);border:1px solid rgba(255,255,255,.12);border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.modal h3{margin:0 0 16px;font-size:28px}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field input,.field textarea,.field select{padding:14px 16px;background:rgba(255,255,255,.06);color:var(--text)}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.hidden{display:none !important}
.tone-1{--chip:#2e5dbe}.tone-2{--chip:#a23f7f}.tone-3{--chip:#2d8b64}.tone-4{--chip:#8b6a1f}.tone-5{--chip:#6f4ec2}.tone-6{--chip:#0088a6}
.tone-1 .dot{background:#6fa0ff}.tone-2 .dot{background:#ff79bf}.tone-3 .dot{background:#4cd39c}.tone-4 .dot{background:#f0c55b}.tone-5 .dot{background:#b48cff}.tone-6 .dot{background:#4ce1ff}
[data-theme="serious"]{--bg:#071226;--panel:#0d1a31cc;--panel-solid:#0d1a31;--text:#eef4ff;--muted:#a6b4d0;--line:#24426d;--accent:#40d8d0;--accent-2:#34d16f}
[data-theme="ocean"]{--accent:#27d1ff;--accent-2:#2cffb2}
[data-theme="ocean"] body{background:radial-gradient(circle at 18% 18%,rgba(39,209,255,.26),transparent 24%),radial-gradient(circle at 82% 22%,rgba(44,255,178,.20),transparent 26%),linear-gradient(180deg,#041226 0%,#02102f 100%)}
[data-theme="sunset"]{--accent:#ff7b39;--accent-2:#ff3fa4}
[data-theme="sunset"] body{background:radial-gradient(circle at 20% 15%,rgba(255,123,57,.30),transparent 24%),radial-gradient(circle at 82% 22%,rgba(255,63,164,.22),transparent 28%),linear-gradient(180deg,#291029 0%,#10091d 100%)}
[data-theme="forest"]{--accent:#47d85a;--accent-2:#9ee63a}
[data-theme="forest"] body{background:radial-gradient(circle at 15% 22%,rgba(71,216,90,.22),transparent 24%),radial-gradient(circle at 85% 24%,rgba(158,230,58,.18),transparent 24%),linear-gradient(180deg,#071d12 0%,#04150b 100%)}
[data-theme="lavender"]{--accent:#9a6cff;--accent-2:#e04bff}
[data-theme="lavender"] body{background:radial-gradient(circle at 18% 18%,rgba(154,108,255,.24),transparent 24%),radial-gradient(circle at 80% 22%,rgba(224,75,255,.18),transparent 26%),linear-gradient(180deg,#170b2f 0%,#0b0820 100%)}
[data-theme="neon"]{--accent:#00ffd5;--accent-2:#84ff00;--panel-solid:#050913;--text:#f5fffd;--muted:#b7ffe9}
[data-theme="neon"] body{background-image:linear-gradient(180deg,#030712,#02050c),linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);background-size:auto,40px 40px,40px 40px;background-position:0 0,0 0,0 0}
[data-theme="candy"]{--accent:#ff5db1;--accent-2:#ffb347}
[data-theme="candy"] body{background:radial-gradient(circle at 18% 18%,rgba(255,93,177,.26),transparent 22%),radial-gradient(circle at 82% 22%,rgba(255,179,71,.22),transparent 24%),linear-gradient(180deg,#2f0e26 0%,#130918 100%)}
[data-theme="contrast"]{--accent:#ffe600;--accent-2:#ff7a00;--panel-solid:#030303;--text:#ffffff;--muted:#f0f0c0}
[data-theme="contrast"] body{background:linear-gradient(180deg,#000,#111)}
[data-theme="arcade"]{--accent:#00f0ff;--accent-2:#ff3fd5;--panel-solid:#14062b;--muted:#e2b9ff}
[data-theme="arcade"] body{background-image:radial-gradient(circle at 20% 18%,rgba(0,240,255,.18),transparent 20%),radial-gradient(circle at 82% 22%,rgba(255,63,213,.16),transparent 20%),linear-gradient(180deg,#11031f 0%,#05030d 100%),linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);background-size:auto,auto,auto,36px 36px,36px 36px}
[data-theme="paper"]{--accent:#7d5f3b;--accent-2:#b69165;--panel-solid:#f3ead9;--text:#31241a;--muted:#6f5b49}
[data-theme="paper"] body,[data-theme="paper"] html{background:linear-gradient(180deg,#efe3cd,#e3d4bb)}
[data-theme="paper"] .card,[data-theme="paper"] .day,[data-theme="paper"] .weekday,[data-theme="paper"] .tab,[data-theme="paper"] .kpi,[data-theme="paper"] .agenda-day{background:rgba(255,248,236,.9);color:#31241a;border-color:rgba(90,65,35,.16)}
[data-theme="paper"] .ghost,[data-theme="paper"] .select-wrap,[data-theme="paper"] .search-wrap{background:#f7efdf;color:#31241a}
[data-theme="paper"] .search-wrap span,[data-theme="paper"] .subtitle,[data-theme="paper"] .view-title p,[data-theme="paper"] th{color:#6f5b49}
[data-theme="gold"]{--accent:#ffd060;--accent-2:#a87b17;--panel-solid:#0b0a0c;--text:#fff4cf;--muted:#d6c390}
[data-theme="galaxy"]{--accent:#6a6cff;--accent-2:#ff58d8;--panel-solid:#0a0620;--muted:#d2c7ff}
@media (max-width:1100px){h1{font-size:48px}.header{flex-direction:column}.header-actions{justify-content:flex-start}.toolbar{flex-direction:column;align-items:stretch}.month-nav{justify-content:space-between}.month-label{text-align:left;min-width:0}}
@media (max-width:780px){body{padding:12px}.weekdays,.grid{gap:6px}.weekday{font-size:12px;padding:10px 4px}.day{min-height:112px;padding:8px}.day-number{font-size:18px}.row{grid-template-columns:1fr}.month-nav{gap:10px}.month-label{font-size:24px;width:100%}.header h1{font-size:40px}}
</style>
</head>
<body>
<div class="app">
  <header class="card header">
    <div>
      <div class="kicker" id="themeBadge">SÉRIEUSE</div>
      <h1 id="heroTitle">Calendrier partagé</h1>
      <p class="subtitle" id="heroSubtitle">Un onglet par personne + une vue consolidée de tous les rendez-vous.</p>
    </div>
    <div class="header-actions">
      <label class="select-wrap"><span>Skin</span>
        <select id="themeSelect">
          <option value="serious">Sérieuse</option><option value="ocean">Océan</option><option value="sunset">Sunset</option>
          <option value="forest">Forêt</option><option value="lavender">Lavande</option><option value="neon">Néon</option>
          <option value="candy">Candy</option><option value="contrast">Contraste</option><option value="arcade">Arcade</option>
          <option value="paper">Agenda papier</option><option value="gold">Luxe noir or</option><option value="galaxy">Galaxie</option>
        </select>
      </label>
      <button class="ghost" id="todayBtn">Aujourd'hui</button>
      <button class="primary" id="addPersonBtn">+ Nouvel onglet</button>
    </div>
  </header>

  <nav class="card tabs" id="tabsBar"></nav>

  <section class="card toolbar">
    <div class="month-nav">
      <button class="ghost" id="prevMonthBtn">← Précédent</button>
      <div class="month-label" id="currentMonthLabel"></div>
      <button class="ghost" id="nextMonthBtn">Suivant →</button>
    </div>
    <label class="search-wrap"><span>Recherche</span><input id="searchInput" placeholder="Titre, personne, lieu..."></label>
  </section>

  <main class="main" id="viewRoot"></main>
</div>

<div id="dayQuickMenuHost" class="hidden"></div>

<div class="modal" id="personModal">
  <div class="modal-card">
    <h3>Créer un onglet personne</h3>
    <div class="field"><label>Nom</label><input id="personNameInput" maxlength="60" placeholder="Ex. Richard, Margot, Studio A"></div>
    <div class="actions"><button class="ghost" id="cancelPersonBtn">Annuler</button><button class="primary" id="savePersonBtn">Créer</button></div>
  </div>
</div>

<div class="modal" id="eventModal">
  <div class="modal-card">
    <h3 id="eventModalTitle">Ajouter un rendez-vous</h3>
    <input type="hidden" id="eventId"><input type="hidden" id="eventDate"><input type="hidden" id="eventOwnerId">
    <div class="field"><label>Titre</label><input id="eventLabel" maxlength="120" placeholder="Ex. Dentiste, réunion, sport"></div>
    <div class="row">
      <div class="field"><label>Heure</label><input id="eventTime" type="time"></div>
      <div class="field"><label>Durée</label><select id="eventDuration"><option>15</option><option selected>30</option><option>45</option><option>60</option><option>90</option><option>120</option></select></div>
    </div>
    <div class="field"><label>Lieu</label><input id="eventLocation" maxlength="120" placeholder="Optionnel"></div>
    <div class="field"><label>Notes</label><textarea id="eventNotes" rows="3" maxlength="300" placeholder="Optionnel"></textarea></div>
    <div class="actions"><button class="ghost hidden" id="deleteEventBtn">Supprimer</button><button class="ghost" id="cancelEventBtn">Annuler</button><button class="primary" id="saveEventBtn">Enregistrer</button></div>
  </div>
</div>

<script>
(function(){
'use strict';
const STORAGE_KEY = 'calendar_singlefile_v2';
const monthNames = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const weekdayNames = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const palette = ['tone-1','tone-2','tone-3','tone-4','tone-5','tone-6'];
const eventTypes = ['Travail','Réunion','Appel','Médecin','École','Sport','Famille','Sortie','Administratif','Autre'];
const themeMeta = {
  serious:{badge:'SÉRIEUSE',title:'Calendrier partagé',subtitle:'Un onglet par personne + une vue consolidée de tous les rendez-vous.'},
  ocean:{badge:'OCÉAN',title:'Marée des rendez-vous',subtitle:'Ambiance marine lumineuse et contrastée.'},
  sunset:{badge:'SUNSET',title:'Fin de journée éclatante',subtitle:'Palette chaude et dynamique.'},
  forest:{badge:'FORÊT',title:'Canopée organisée',subtitle:'Version végétale vive et profonde.'},
  lavender:{badge:'LAVANDE',title:'Agenda impérial',subtitle:'Violet assumé, plus premium.'},
  neon:{badge:'NÉON',title:'Console futuriste',subtitle:'Contraste radical et accents fluorescents.'},
  candy:{badge:'CANDY',title:'Calendrier pop',subtitle:'Skin ludique, sucrée et très colorée.'},
  contrast:{badge:'CONTRASTE',title:'Mode impact',subtitle:'Noir fort et lecture maximale.'},
  arcade:{badge:'ARCADE',title:'Salle d\'arcade',subtitle:'Néons rétro et esprit jeu vidéo.'},
  paper:{badge:'PAPIER',title:'Carnet de rendez-vous',subtitle:'Texture claire et style agenda papier.'},
  gold:{badge:'LUXE',title:'Édition prestige',subtitle:'Noir satiné et or plus premium.'},
  galaxy:{badge:'GALAXIE',title:'Constellation des RDV',subtitle:'Version spatiale plus spectaculaire.'}
};
let quickMenuDay = null;
let dragState = null;
function safeId(){ return (globalThis.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'id_'+Math.random().toString(36).slice(2,10); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }
const defaultState = { currentDate:new Date().toISOString().slice(0,10), activeTab:'all', theme:'serious', people:[{id:safeId(),name:'Richard',color:'tone-1'},{id:safeId(),name:'Margot',color:'tone-2'}], events:[] };
function loadState(){ try{ const raw = localStorage.getItem(STORAGE_KEY); const s = raw ? JSON.parse(raw) : null; return s ? Object.assign(clone(defaultState), s) : clone(defaultState);}catch(e){ return clone(defaultState);} }
let state = loadState();
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function normalize(){
  if(!Array.isArray(state.people)) state.people=[];
  if(!Array.isArray(state.events)) state.events=[];
  state.people = state.people.filter(p=>p && p.id && p.name).map((p,i)=>({id:String(p.id),name:String(p.name).trim()||('Personne '+(i+1)),color:p.color||palette[i%palette.length]}));
  if(!state.people.length) state.people = clone(defaultState.people);
  const ids = new Set(state.people.map(p=>p.id));
  state.events = state.events.filter(e=>e && e.date && e.time && e.label).map(e=>({id:e.id||safeId(),ownerId:ids.has(e.ownerId)?e.ownerId:state.people[0].id,date:e.date,time:e.time,label:e.label,location:e.location||'',notes:e.notes||'',duration:Number(e.duration)||30}));
  if(state.activeTab!=='all' && !ids.has(state.activeTab)) state.activeTab='all';
  if(!themeMeta[state.theme]) state.theme='serious';
  saveState();
}
function seedDemo(){
  if(state.events.length) return;
  const now = new Date(), y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
  const p1=state.people[0], p2=state.people[1]||state.people[0];
  state.events=[
    {id:safeId(),ownerId:p1.id,date:`${y}-${m}-08`,time:'09:30',label:'Dentiste',location:'Cabinet médical',notes:'Contrôle annuel',duration:30},
    {id:safeId(),ownerId:p1.id,date:`${y}-${m}-12`,time:'14:00',label:'Réunion client',location:'Teams',notes:'',duration:60},
    {id:safeId(),ownerId:p2.id,date:`${y}-${m}-12`,time:'16:30',label:'Cours de guitare',location:'Studio',notes:'',duration:45},
    {id:safeId(),ownerId:p2.id,date:`${y}-${m}-20`,time:'11:00',label:'Orthodontiste',location:'',notes:'',duration:30}
  ];
  saveState();
}
const $ = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dateVal(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function monthDate(){ return new Date(state.currentDate+'T12:00:00'); }
function shiftMonth(delta){ const d=monthDate(); d.setMonth(d.getMonth()+delta); state.currentDate=dateVal(d); saveState(); render(); }
function formatDateFr(s,short){ const d=new Date(s+'T12:00:00'); return new Intl.DateTimeFormat('fr-FR',{weekday:short?undefined:'long',day:'numeric',month:'long',year:short?undefined:'numeric'}).format(d); }
function getPerson(id){ return state.people.find(p=>p.id===id); }
function getFilteredEvents(){
  const q = ($('searchInput').value||'').trim().toLowerCase();
  const cur=monthDate(), y=cur.getFullYear(), m=cur.getMonth();
  return state.events.filter(e=>state.activeTab==='all' || e.ownerId===state.activeTab).filter(e=>{ const d=new Date(e.date+'T12:00:00'); if(d.getFullYear()!==y || d.getMonth()!==m) return false; if(!q) return true; const owner=(getPerson(e.ownerId)||{}).name||''; return [e.label,e.location,e.notes,owner,e.time].join(' ').toLowerCase().includes(q); }).sort((a,b)=>(`${a.date} ${a.time}`).localeCompare(`${b.date} ${b.time}`));
 }
 function buildMonthMatrix(year,month){ const first=new Date(year,month,1); const firstDay=(first.getDay()+6)%7; const start=new Date(year,month,1-firstDay); const out=[]; for(let i=0;i<42;i++){ const d=new Date(start); d.setDate(start.getDate()+i); out.push({date:d,currentMonth:d.getMonth()===month}); } return out; }
 function applyTheme(){ document.documentElement.setAttribute('data-theme', state.theme); const meta=themeMeta[state.theme]; $('themeBadge').textContent=meta.badge; $('heroTitle').textContent=meta.title; $('heroSubtitle').textContent=meta.subtitle; $('themeSelect').value=state.theme; }
 function renderTabs(){ $('tabsBar').innerHTML = [`<button class="tab ${state.activeTab==='all'?'active':''}" data-tab="all">Vue finale - Tous les RDV</button>`].concat(state.people.map(p=>`<button class="tab ${state.activeTab===p.id?'active':''}" data-tab="${p.id}">${esc(p.name)}</button>`)).join(''); document.querySelectorAll('[data-tab]').forEach(btn=>btn.addEventListener('click',()=>{ state.activeTab=btn.getAttribute('data-tab'); saveState(); render(); })); }
 function renderMonthLabel(){ const d=monthDate(); $('currentMonthLabel').textContent = monthNames[d.getMonth()]+' '+d.getFullYear(); }
 function eventBtn(e,showOwner){ const owner=getPerson(e.ownerId)||{name:'Sans nom',color:'tone-1'}; return `<button class="event ${owner.color}" draggable="true" data-edit="${e.id}" data-event-id="${e.id}"><time>${esc(e.time)}</time><span>${esc(e.label)}</span>${showOwner?`<small>${esc(owner.name)}</small>`:(e.location?`<small>${esc(e.location)}</small>`:'')}</button>`; }
 function dayCell(day,today,events,isCombined,ownerId){ const iso=dateVal(day.date), capped=events.slice(0,isCombined?4:3), more=events.length-capped.length, dayOwner=(ownerId||state.people[0].id); return `<article class="day ${day.currentMonth?'':'outside'} ${iso===today?'today':''}" data-day-date="${iso}" data-owner="${dayOwner}" data-combined="${isCombined?'1':'0'}"><div class="day-head"><span class="day-number">${day.date.getDate()}</span>${day.currentMonth?`<button class="add-mini" data-add-date="${iso}" data-owner="${dayOwner}">+</button>`:''}</div><div class="stack">${capped.length?capped.map(e=>eventBtn(e,isCombined)).join(''):'<div class="empty">Aucun rendez-vous</div>'}${more>0?`<div class="more">+ ${more} autre(s)</div>`:''}</div></article>`; }
 function renderPersonCalendar(personId){ const d=monthDate(), matrix=buildMonthMatrix(d.getFullYear(),d.getMonth()), today=dateVal(new Date()), person=getPerson(personId); const events=getFilteredEvents(); return `<section class="card calendar-shell"><div class="view-title"><h2>${esc(person?person.name:'Calendrier')}</h2><p>Vue mensuelle de cette personne.</p></div><div class="weekdays">${weekdayNames.map(w=>`<div class="weekday">${w}</div>`).join('')}</div><div class="grid">${matrix.map(day=>dayCell(day,today,events.filter(e=>e.ownerId===personId && e.date===dateVal(day.date)),false,personId)).join('')}</div></section>`; }
 function renderCombined(){ const d=monthDate(), matrix=buildMonthMatrix(d.getFullYear(),d.getMonth()), today=dateVal(new Date()), events=getFilteredEvents(); const groups={}; events.forEach(e=>((groups[e.date]=groups[e.date]||[]).push(e))); const peopleCount=new Set(events.map(e=>e.ownerId)).size; const next=events.find(e=>`${e.date}T${e.time}` >= new Date().toISOString().slice(0,16)); return `<section class="card agenda-shell"><div style="display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start"><div class="view-title"><h2>Vue finale consolidée</h2><p>Lecture visuelle de tous les rendez-vous du mois, puis détail par journée.</p></div><div class="kpis"><div class="kpi"><span>Total RDV</span><strong>${events.length}</strong></div><div class="kpi"><span>Personnes</span><strong>${peopleCount}</strong></div><div class="kpi"><span>Prochain RDV</span><strong>${next?`${formatDateFr(next.date,true)} · ${esc(next.time)}`:'—'}</strong></div></div></div><div class="legend">${state.people.map(p=>`<span class="item ${p.color}"><span class="dot"></span>${esc(p.name)}</span>`).join('')}</div></section><section class="card calendar-shell" style="margin-top:16px"><div class="weekdays">${weekdayNames.map(w=>`<div class="weekday">${w}</div>`).join('')}</div><div class="grid">${matrix.map(day=>dayCell(day,today,events.filter(e=>e.date===dateVal(day.date)),true,'')).join('')}</div></section><section class="card agenda-shell" style="margin-top:16px"><div class="agenda-list">${Object.keys(groups).length?Object.keys(groups).sort().map(date=>`<section class="agenda-day"><div class="agenda-headline"><div>${formatDateFr(date,false)}</div><div>${groups[date].length} rendez-vous</div></div><div class="table-wrap"><table><thead><tr><th>Heure</th><th>Personne</th><th>Rendez-vous</th><th>Lieu / notes</th><th>Action</th></tr></thead><tbody>${groups[date].sort((a,b)=>a.time.localeCompare(b.time)).map(e=>{ const p=getPerson(e.ownerId)||{name:'Sans nom',color:'tone-1'}; return `<tr><td>${esc(e.time)}</td><td><span class="item ${p.color}"><span class="dot"></span>${esc(p.name)}</span></td><td>${esc(e.label)}</td><td>${esc([e.location,e.notes].filter(Boolean).join(' — ')||'—')}</td><td><button class="ghost" data-edit="${e.id}">Modifier</button></td></tr>`; }).join('')}</tbody></table></div></section>`).join(''):'<div class="empty">Aucun rendez-vous pour les filtres actuels.</div>'}</div></section>`; }
 function bindDynamic(){
  document.querySelectorAll('[data-add-date]').forEach(btn=>btn.addEventListener('click',()=>{ closeQuickMenu(); openEvent({id:'',ownerId:btn.getAttribute('data-owner'),date:btn.getAttribute('data-add-date'),label:'',time:'09:00',duration:30,location:'',notes:''}); }));
  document.querySelectorAll('[data-edit]').forEach(btn=>btn.addEventListener('click',e=>{
    if(dragState && dragState.moved) return;
    const ev=state.events.find(x=>x.id===btn.getAttribute('data-edit')); if(ev) openEvent(ev);
  }));
  document.querySelectorAll('.event[data-event-id]').forEach(btn=>{
    btn.addEventListener('mousedown',startMouseDrag);
  });
 }

 function getDropDayFromPoint(x,y){
  const el = document.elementFromPoint(x,y);
  if(!el) return null;
  const day = el.closest('.day[data-day-date]');
  return day && !day.classList.contains('outside') ? day : null;
 }
 function clearDropTargets(){ document.querySelectorAll('.day.drop-target').forEach(d=>d.classList.remove('drop-target')); }
 function removeDragGhost(){ const g=document.querySelector('.drag-ghost'); if(g) g.remove(); }
 function startMouseDrag(e){
  if(e.button!==0) return;
  const btn=e.currentTarget;
  const eventId = btn.getAttribute('data-event-id');
  if(!eventId) return;
  closeQuickMenu();
  dragState = {eventId:eventId, sourceBtn:btn, startX:e.clientX, startY:e.clientY, moved:false, ghost:null, activeDay:null};
  document.addEventListener('mousemove',onMouseDrag);
  document.addEventListener('mouseup',endMouseDrag);
 }
 function onMouseDrag(e){
  if(!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if(!dragState.moved && Math.hypot(dx,dy) < 6) return;
  if(!dragState.moved){
    dragState.moved = true;
    document.body.classList.add('drag-active');
    dragState.sourceBtn.classList.add('dragging');
    const ghost=document.createElement('div');
    ghost.className='drag-ghost';
    ghost.innerHTML=dragState.sourceBtn.innerHTML;
    document.body.appendChild(ghost);
    dragState.ghost=ghost;
  }
  if(dragState.ghost){
    dragState.ghost.style.transform=`translate(${e.clientX+16}px,${e.clientY+16}px)`;
  }
  clearDropTargets();
  const day=getDropDayFromPoint(e.clientX,e.clientY);
  if(day){ day.classList.add('drop-target'); dragState.activeDay=day; } else { dragState.activeDay=null; }
 }
 function endMouseDrag(e){
  document.removeEventListener('mousemove',onMouseDrag);
  document.removeEventListener('mouseup',endMouseDrag);
  if(!dragState) return;
  const moved = dragState.moved;
  const eventId = dragState.eventId;
  const targetDay = moved ? (dragState.activeDay || getDropDayFromPoint(e.clientX,e.clientY)) : null;
  const sourceBtn = dragState.sourceBtn;
  removeDragGhost();
  clearDropTargets();
  document.body.classList.remove('drag-active');
  if(sourceBtn) sourceBtn.classList.remove('dragging');
  dragState=null;
  if(moved && targetDay){
    const targetOwner = state.activeTab==='all' ? null : (targetDay.getAttribute('data-owner') || state.activeTab);
    moveEventToDate(eventId, targetDay.getAttribute('data-day-date'), targetOwner);
  }
 }

 function render(){ applyTheme(); renderTabs(); renderMonthLabel(); $('viewRoot').innerHTML = state.activeTab==='all' ? renderCombined() : renderPersonCalendar(state.activeTab); bindDynamic(); }
 function openModal(id){ $(id).classList.add('open'); }
 function closeModal(id){ $(id).classList.remove('open'); }
 function closeQuickMenu(){ if(quickMenuDay){ const menu=quickMenuDay.querySelector('.day-menu'); if(menu) menu.remove(); quickMenuDay=null; } }
 function openQuickMenu(dayEl){ closeQuickMenu(); if(!dayEl || dayEl.classList.contains('outside')) return; quickMenuDay=dayEl; const ownerOptions = state.people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join(''); const defaultOwner = state.activeTab==='all' ? (dayEl.getAttribute('data-owner')||state.people[0].id) : state.activeTab; const ownerRow = state.activeTab==='all' ? `<div class="mini-row one"><select class="quick-owner">${ownerOptions}</select></div>` : ''; dayEl.insertAdjacentHTML('beforeend', `<div class="day-menu"><div class="mini-title">Choisir la nature du rendez-vous</div>${ownerRow}<div class="mini-row one"><select class="quick-type">${eventTypes.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select></div><div class="mini-actions"><button type="button" class="primary quick-continue">Continuer</button><button type="button" class="ghost quick-cancel">Annuler</button></div></div>`); const menu = dayEl.querySelector('.day-menu'); const ownerSelect = menu.querySelector('.quick-owner'); if(ownerSelect) ownerSelect.value = defaultOwner; menu.querySelector('.quick-cancel').addEventListener('click', closeQuickMenu); menu.querySelector('.quick-continue').addEventListener('click', ()=>{ const ownerId = ownerSelect ? ownerSelect.value : (state.activeTab==='all' ? state.people[0].id : state.activeTab); const label = menu.querySelector('.quick-type').value || 'Autre'; closeQuickMenu(); openEvent({id:'',ownerId:ownerId,date:dayEl.getAttribute('data-day-date'),label:label,time:'09:00',duration:30,location:'',notes:''}); }); }
 function moveEventToDate(eventId,newDate,newOwnerId){ const ev=state.events.find(e=>e.id===eventId); if(!ev || !newDate) return; ev.date=newDate; if(newOwnerId && state.people.some(p=>p.id===newOwnerId)) ev.ownerId=newOwnerId; state.events.sort((a,b)=>(`${a.date} ${a.time}`).localeCompare(`${b.date} ${b.time}`)); saveState(); render(); }
 function openEvent(ev){ $('eventModalTitle').textContent = ev.id ? 'Modifier le rendez-vous' : 'Ajouter un rendez-vous'; $('eventId').value=ev.id||''; $('eventDate').value=ev.date||dateVal(new Date()); $('eventOwnerId').value=ev.ownerId||state.people[0].id; $('eventLabel').value=ev.label||''; $('eventTime').value=ev.time||'09:00'; $('eventDuration').value=String(ev.duration||30); $('eventLocation').value=ev.location||''; $('eventNotes').value=ev.notes||''; $('deleteEventBtn').classList.toggle('hidden', !ev.id); openModal('eventModal'); }
 function saveEvent(){ const label=$('eventLabel').value.trim(); if(!label){ alert('Entre un titre.'); return; } const payload={ id:$('eventId').value||safeId(), ownerId:$('eventOwnerId').value||state.people[0].id, date:$('eventDate').value||dateVal(new Date()), label:label, time:$('eventTime').value||'09:00', duration:Number($('eventDuration').value)||30, location:$('eventLocation').value.trim(), notes:$('eventNotes').value.trim() }; const idx=state.events.findIndex(e=>e.id===payload.id); if(idx>=0) state.events[idx]=payload; else state.events.push(payload); state.events.sort((a,b)=>(`${a.date} ${a.time}`).localeCompare(`${b.date} ${b.time}`)); saveState(); closeModal('eventModal'); render(); }
 function deleteEvent(){ const id=$('eventId').value; if(!id) return; state.events = state.events.filter(e=>e.id!==id); saveState(); closeModal('eventModal'); render(); }
 function addPerson(){ const name=$('personNameInput').value.trim(); if(!name){ alert('Entre un nom.'); return; } const p={id:safeId(),name:name,color:palette[state.people.length%palette.length]}; state.people.push(p); state.activeTab=p.id; saveState(); $('personNameInput').value=''; closeModal('personModal'); render(); }
 function bindStatic(){ $('prevMonthBtn').addEventListener('click',()=>{ closeQuickMenu(); shiftMonth(-1); }); $('nextMonthBtn').addEventListener('click',()=>{ closeQuickMenu(); shiftMonth(1); }); $('todayBtn').addEventListener('click',()=>{ closeQuickMenu(); state.currentDate=dateVal(new Date()); saveState(); render(); }); $('searchInput').addEventListener('input',render); $('themeSelect').addEventListener('change',()=>{ closeQuickMenu(); state.theme=$('themeSelect').value; saveState(); render(); }); $('addPersonBtn').addEventListener('click',()=>openModal('personModal')); $('cancelPersonBtn').addEventListener('click',()=>closeModal('personModal')); $('savePersonBtn').addEventListener('click',addPerson); $('cancelEventBtn').addEventListener('click',()=>closeModal('eventModal')); $('saveEventBtn').addEventListener('click',saveEvent); $('deleteEventBtn').addEventListener('click',deleteEvent); ['personModal','eventModal'].forEach(id=>$(id).addEventListener('click',e=>{ if(e.target.id===id) closeModal(id); })); document.addEventListener('click',e=>{ if(quickMenuDay && !e.target.closest('.day-menu') && !e.target.closest('.day')) closeQuickMenu(); }); document.addEventListener('contextmenu',e=>{ const day=e.target.closest('.day[data-day-date]'); if(!day || day.classList.contains('outside') || e.target.closest('.day-menu') || e.target.closest('.add-mini')) return; e.preventDefault(); e.stopPropagation(); openQuickMenu(day); }); document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeQuickMenu(); }); }
 try{ normalize(); seedDemo(); bindStatic(); render(); }
 catch(err){ console.error(err); document.body.innerHTML = '<div style="padding:24px;color:white;font-family:Arial,sans-serif"><h2>Erreur de chargement</h2><pre style="white-space:pre-wrap">'+(err && err.stack ? err.stack : String(err))+'</pre></div>'; }
})();
</script>
</body>
